name: content-engine

on:
  schedule:
    - cron: '0 3 * * 1'   # Every Monday at 03:00 UTC
  workflow_dispatch:
    inputs:
      site:
        description: 'Site to regenerate (leave blank for all)'
        required: false
        default: ''
      limit:
        description: 'Max pages per batch (each of 6 batches runs this many)'
        required: false
        default: '50'
      demo:
        description: 'Demo mode (no API calls)'
        required: false
        default: 'false'

jobs:

  # ── Job 1: Generate content in 6 parallel batches ────────────────────────
  # Each batch handles a slice of the entity pairs.
  # 6 runners × 50 pages = 300 pages per run, well within Gemini free tier.
  # fail-fast: false means one batch hitting a rate limit won't kill the others.
  generate:
    name: Generate Content (Batch ${{ matrix.batch_index }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        batch_index: [1, 2, 3, 4, 5, 6]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install anthropic jinja2 pandas pyyaml

      - name: Run content generator (Batch ${{ matrix.batch_index }} of 6)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AI_PROVIDER: gemini
        run: |
          SITE="${{ github.event.inputs.site || 'email-tools' }}"
          LIMIT="${{ github.event.inputs.limit || '50' }}"
          DEMO="${{ github.event.inputs.demo || 'false' }}"
          if [ "$DEMO" = "true" ]; then
            python scripts/generate.py --site "$SITE" --limit "$LIMIT" \
              --batch-index ${{ matrix.batch_index }} --batch-total 6 --demo
          else
            python scripts/generate.py --site "$SITE" --limit "$LIMIT" \
              --batch-index ${{ matrix.batch_index }} --batch-total 6
          fi

      - name: Upload generated content
        uses: actions/upload-artifact@v4
        with:
          name: content-batch-${{ matrix.batch_index }}
          path: content/
          retention-days: 1

  # ── Job 2: Build and deploy after all batches complete ───────────────────
  build-and-deploy:
    name: Build and Deploy
    needs: generate
    runs-on: ubuntu-latest
    if: always()    # run even if some batches failed
    permissions:
      contents: write
    strategy:
      matrix:
        site: [email-tools]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install anthropic jinja2 pandas pyyaml

      - name: Download all generated content
        uses: actions/download-artifact@v4
        with:
          pattern: content-batch-*
          merge-multiple: true
          path: content/
        continue-on-error: true   # ok if some batches produced nothing new

      - name: Build static site
        run: python scripts/build.py --site ${{ matrix.site }}

      - name: Commit generated content
        run: |
          git config user.name "pseo-bot"
          git config user.email "bot@aiopentec.github.io"
          git add -f content/ sites/
          git diff --staged --quiet || git commit -m "chore: auto-generate content $(date +%Y-%m-%d)"
          git push || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/${{ matrix.site }}
          cname: emailtoolcompare.com
